productName: 寻达
appId: if.xunda.desktop
copyright: Copyright © 2026 寻达（XunDa）
directories:
  output: dist/${version}
files:
  - 'out/**/*'
  - 'package.json'
  - "node_modules/**/*"
  - '!node_modules/**/{test,tests,__tests__}/**'
  - '!node_modules/**/*.{md,ts,tsx,map}'                 # 排除所有文档和源码文件
  - '!node_modules/**/tsconfig*.json'                    # 排除 TS 配置
  - '!node_modules/**/.gitignore'                        # 排除 Git 配置
  - '!node_modules/playwright-core/.local-browsers/**/*'
  - '!node_modules/@playwright/browser-chromium/**/*'
  - '!node_modules/@types/**'
# asar: false
asarUnpack:
  - "**/*.node"
extraResources:
  - from: ./resources
    to: ./
electronLanguages:
  - zh-CN
  - zh-TW
  - en-US
win:
  icon: ./resources/icons/win/icon.png
  target:
    - target: nsis
      arch:
        - x64
  extraResources:
    #    - from: ./build/chrome-headless-shell-win64.zip
    #      to: ./browser/chrome-headless-shell.zip
    - from: ./build/chrome-win64.zip
      to: ./browser/chrome.zip
nsis:
  allowElevation: true                                # 重点：安装时请求管理员权限
  allowToChangeInstallationDirectory: true            # 允许用户自定义安装路径
  artifactName: xunda-${version}-win-${arch}.${ext}   # 安装包命名格式
  createDesktopShortcut: always                       # 始终创建桌面快捷方式
  createStartMenuShortcut: true                       # 创建开始菜单快捷方式
  oneClick: false                                     # 非一键安装模式（显示安装向导）
  perMachine: true                                    # 重点：设为 true 默认安装到 Program Files
  runAfterFinish: true                                # 安装完成后自动运行应用
  shortcutName: 寻达                                   # 快捷方式名称
  uninstallDisplayName: 寻达                           # 卸载程序中显示的名称
mac:
  icon: "build/icon.icns"
  artifactName: xunda-${version}-mac-${arch}.${ext}
  category: "public.app-category.utilities"
  identity: null
  extendInfo:
    - CFBundleExecutable: "XunDa"
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  extraResources:
    - from: ./build/chrome-mac-${arch}.zip
      to: ./browser/chrome.zip
    - from: ./build/chrome-headless-shell-mac-${arch}.zip
      to: ./browser/chrome-headless-shell.zip
dmg:
  title: "安装 ${productName}"
  iconSize: 100
  contents:
    - x: 140
      y: 150
    - x: 400
      y: 150
      type: "link"
      path: "/Applications"
npmRebuild: true
publish:
  provider: generic
  url: https://download.xunda.club/
electronDownload:
  mirror: https://mirrors.huaweicloud.com/electron/
releaseInfo:
  releaseNotesFile: release-notes.md
electronVersion: 41.1.1
