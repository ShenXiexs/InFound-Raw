[project]
name = "core-web"
version = "0.1.0"
description = "Web 项目公用类库"
authors = [
    { name = "Thomas Xing" }
]
requires-python = ">=3.13"
dependencies = [
    "core-base",
    "fastapi>=0.135.0",
    "structlog>=25.5.0",
]

[build-system]
requires = ["uv_build>=0.9.26,<0.10.0"]
build-backend = "uv_build"

[tool.uv.sources]
shared-infrastructure = { workspace = true }
core-base = { workspace = true }
