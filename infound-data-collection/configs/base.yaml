# Global base config (shared by all services)
APP_NAME: "infound-data-collection"

# MySQL defaults
MYSQL_CHARSET: "utf8mb4"
MYSQL_PORT: 3306
MYSQL_USER: "root"
MYSQL_HOST: "localhost"

# Redis defaults
REDIS_DB: 0
REDIS_URL: "redis://localhost:6379/0"

# Logging defaults
LOG_LEVEL: "INFO"
LOG_FILE_MAX_SIZE: 10  # MB
LOG_FILE_BACKUP_COUNT: 30  # keep 30 days
LOG_DIR: "logs"


# Common RabbitMQ config (can be overridden per consumer)
RABBITMQ:
  HOST: "<RABBITMQ_HOST>"
  PORT: 8803
  USERNAME: "<RABBITMQ_USER>"
  PASSWORD: "<RABBITMQ_PASSWORD>"
  VHOST: "<RABBITMQ_VHOST>"
  PREFETCH_COUNT: 1
  RECONNECT_DELAY: 5
  MAX_RECONNECT_ATTEMPTS: 1

CONSUMERS:
  - "portal_tiktok_sample_crawler"
  - "portal_tiktok_creator_crawler"
  - "portal_tiktok_sample_crawler_html"
  - "sample_chatbot"
  - "outreach_chatbot"
  - "unified_chatbot"
